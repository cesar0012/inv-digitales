    .rsvp-western__message {

    .rsvp-western__action {

      text-decoration: none;

        box-shadow 0.35s ease,

    .rsvp-western__action:hover,

      transform: translateY(-2px);

    .rsvp-western__decor {

    .rsvp-western__decor--hat {
      left: clamp(-2rem, -2vw, -1rem);
      bottom: clamp(1rem, 5vw, 4rem);
      width: clamp(240px, 34vw, 560px);
      aspect-ratio: 5 / 3;
      border-radius: 999px 999px 60px 60px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.5), rgba(0,0,0,0.1)),
        rgba(255,255,255,0.42);
      border: 1px dashed rgba(0, 0, 0, 0.12);
      transform: rotate(-10deg);
    }

    .rsvp-western__decor--horse {
      right: clamp(1rem, 7vw, 6rem);
      bottom: clamp(2rem, 8vw, 7rem);
      width: clamp(240px, 32vw, 520px);
      aspect-ratio: 4 / 3;
      border-radius: 48% 52% 46% 54%;
      background:
        linear-gradient(135deg, rgba(0,0,0,0.12), rgba(0,0,0,0.04)),
        rgba(255,255,255,0.18);
      border: 1px dashed rgba(0, 0, 0, 0.1);
      filter: blur(0.2px);
    }

    .rsvp-western__decor--top-flowers {
      right: clamp(0.5rem, 3vw, 2rem);
      top: clamp(0.5rem, 3vw, 2rem);
      width: clamp(180px, 27vw, 440px);
      aspect-ratio: 5 / 2.4;
      border-radius: 999px;
      background:
        radial-gradient(circle at 25% 48%, rgba(0,0,0,0.11) 0 14%, transparent 15%),
        radial-gradient(circle at 55% 45%, rgba(0,0,0,0.13) 0 18%, transparent 19%),
        radial-gradient(circle at 82% 56%, rgba(0,0,0,0.09) 0 13%, transparent 14%);
      border: 1px dashed rgba(0, 0, 0, 0.08);
    }

    .rsvp-western__motion {
      opacity: 0;
      transform: translateY(18px);
      animation: rsvpWesternReveal 0.5s ease-out forwards;
    }

    .rsvp-western__decor--hat {
      animation-delay: 0.04s;
    }

    .rsvp-western__decor--horse {
      animation-delay: 0.08s;
    }

    .rsvp-western__card {
      animation-delay: 0.12s;
    }

    @keyframes rsvpWesternReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .rsvp-western__card {
        width: min(720px, 94vw);
        min-height: auto;
      }

      .rsvp-western__decor {
        opacity: 0.34;
      }
    }

    @media (max-width: 560px) {
      .module-rsvp-western {
        min-height: 100svh;
      }

      .rsvp-western__inner {
        min-height: 100svh;
        padding: 2rem 1.25rem;
      }

      .rsvp-western__card {
        width: 100%;
        padding: 2.5rem 1.35rem;
        border-radius: 28px;
      }

      .rsvp-western__title {
        font-size: clamp(3rem, 15vw, 4.7rem);
      }

      .rsvp-western__eyebrow {
        letter-spacing: 0.22em;
      }

      .rsvp-western__action {
        width: 100%;
        min-width: 0;
      }

      .rsvp-western__decor--horse {
        right: -5rem;
        bottom: 1rem;
      }

      .rsvp-western__decor--hat {
        left: -6rem;
        bottom: 1rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .rsvp-western__motion,
      .rsvp-western__action {
        animation: none;
        transition: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>

    <div

    ></div>

    <div

    <article class="rsvp-western__card rsvp-western__motion">
      <header
        class="rsvp-western__content"
        memory_type="text"

      >
        <div
          class="rsvp-western__monogram-wrap"

  <script>
    const moduleMetadata = {
      tags: [
        "confirmacion",
        "rsvp",
        "asistencia",
        "boda",
        "western",
        "vaquera",
        "charra",
        "monograma",
        "boton",
        "tarjeta central",
        "sombrero",
        "caballo",
        "responsive"
      ],
      descripcion:
        "Wireframe de RSVP para boda western con tarjeta central, monograma, mensaje de confirmación, botón principal y decoraciones temáticas."
    };

    (function () {
      const module = document.querySelector('[data-gemini-id="confirmacion-texto"]');

      if (!module) return;

      const card = module.querySelector(".rsvp-western__card");
      const decor = module.querySelectorAll(".rsvp-western__decor");
      const monogram = module.querySelector(".rsvp-western__monogram-wrap");

      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      ).matches;

      if (prefersReducedMotion) return;

      module.addEventListener("pointermove", function (event) {
        const rect = module.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width - 0.5;
        const y = (event.clientY - rect.top) / rect.height - 0.5;

        if (card) {
          card.style.transform =
            "translate(" + x * 5 + "px, " + y * 4 + "px)";
        }

        if (monogram) {
          monogram.style.transform =
            "translate(" + x * -6 + "px, " + y * -5 + "px)";
        }

        decor.forEach(function (item, index) {
          const depth = (index + 1) * 4;
          item.style.transform =
            "translate(" + x * depth + "px, " + y * depth + "px)";
        });
      });

      module.addEventListener("pointerleave", function () {
        if (card) {
          card.style.transform = "translate(0, 0)";
        }

        if (monogram) {
          monogram.style.transform = "translate(0, 0)";
        }

        decor.forEach(function (item) {
          item.style.transform = "";
        });
      });
    })();
  </script>
