  <script>
    const moduleMetadata = {
      tags: [
        "portada",
        "hero",
        "boda",
        "western",
        "vaquera",
        "charra",
        "rosas",
        "sombrero",
        "botas",
        "tarjeta central",
        "invitacion digital",
        "responsive"
      ],
      descripcion:
        "Wireframe de portada para boda western con fondo generado, decoraciones laterales, tarjeta central, nombres, fecha, mensaje breve y CTA."
    };

    (function () {
      const module = document.querySelector('[data-gemini-id="portada-nombre"]');

      if (!module) return;

      const card = module.querySelector(".portada-western__card");
      const decorations = module.querySelectorAll(".portada-western__decor");

      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      ).matches;

      if (prefersReducedMotion) return;

      module.addEventListener("pointermove", function (event) {
        const rect = module.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width - 0.5;
        const y = (event.clientY - rect.top) / rect.height - 0.5;

        if (card) {
          card.style.transform =
            "translate(" + x * 8 + "px, " + y * 6 + "px)";
        }

        decorations.forEach(function (item, index) {
          const depth = (index + 1) * 4;
          item.style.transform =
            "translate(" +
            x * depth +
            "px, " +
            y * depth +
            "px) rotate(" +
            (index % 2 === 0 ? -4 : 4) +
            "deg)";
        });
      });

      module.addEventListener("pointerleave", function () {
        if (card) {
          card.style.transform = "translate(0, 0)";
        }

        decorations.forEach(function (item) {
          item.style.transform = "";
        });
      });
    })();
  </script>
