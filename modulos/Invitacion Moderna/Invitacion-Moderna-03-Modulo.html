<section
  class="module-countdown-editorial-photo"
  data-gemini-id="countdown-target"
  memory_type="background"
  memory_usage="protected"
  memory_source="generated"
  path="placeholder"
  aria-labelledby="countdown-editorial-title"
>
  <style>
    .module-countdown-editorial-photo {
      --primary-color: #202326;
      --secondary-color: #6f7478;
      --accent-color: #b59b72;
      --surface-color: rgba(255, 255, 255, 0.94);
      --surface-border-color: rgba(0, 0, 0, 0.1);
      --overlay-color: rgba(0, 0, 0, 0.54);
      --text-color: #202326;

      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      box-sizing: border-box;
      color: var(--text-color);
      background-color: #eeeeee;
      background-image: url("https://loremflickr.com/1920/1080/couple,wedding");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      isolation: isolate;
    }

    .module-countdown-editorial-photo::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.64),
          rgba(0, 0, 0, 0.32),
          rgba(0, 0, 0, 0.58)
        ),
        var(--overlay-color);
      z-index: -1;
      pointer-events: none;
    }

    .countdown-editorial__inner {
      width: min(1280px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 5rem);
      box-sizing: border-box;
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) minmax(360px, 1.1fr);
      align-items: center;
      gap: clamp(2rem, 6vw, 6rem);
    }

    .countdown-editorial__intro {
      color: #ffffff;
      max-width: 520px;
    }

    .countdown-editorial__eyebrow {
      margin: 0 0 clamp(1rem, 2vw, 1.5rem);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1rem, 1.6vw, 1.25rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .countdown-editorial__title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.5rem, 7vw, 7rem);
      font-weight: 400;
      line-height: 0.96;
      letter-spacing: -0.04em;
    }

    .countdown-editorial__description {
      max-width: 460px;
      margin: clamp(1.25rem, 2.5vw, 2rem) 0 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(1rem, 1.4vw, 1.12rem);
      line-height: 1.75;
      color: rgba(255, 255, 255, 0.82);
    }

    .countdown-editorial__card {
      position: relative;
      width: min(620px, 100%);
      justify-self: end;
      padding: clamp(2rem, 4vw, 4rem);
      box-sizing: border-box;
      background: var(--surface-color);
      border: 1px solid var(--surface-border-color);
      border-radius: clamp(10px, 1.4vw, 18px);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .countdown-editorial__card::before,
    .countdown-editorial__card::after {
      content: "";
      position: absolute;
      width: 72px;
      height: 72px;
      border-color: var(--accent-color);
      border-style: solid;
      opacity: 0.42;
      pointer-events: none;
    }

    .countdown-editorial__card::before {
      top: 1rem;
      left: 1rem;
      border-width: 1px 0 0 1px;
    }

    .countdown-editorial__card::after {
      right: 1rem;
      bottom: 1rem;
      border-width: 0 1px 1px 0;
    }

    .countdown-editorial__card-header {
      text-align: center;
      margin-bottom: clamp(2rem, 4vw, 3rem);
    }

    .countdown-editorial__small-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary-color);
    }

    .countdown-editorial__subtitle {
      margin: 0.75rem auto 0;
      max-width: 420px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1rem, 1.6vw, 1.25rem);
      font-style: italic;
      line-height: 1.5;
      color: var(--secondary-color);
    }

    .countdown-editorial__ornament {
      width: min(120px, 42%);
      height: 28px;
      margin: 1.25rem auto 0;
      position: relative;
      color: var(--accent-color);
    }

    .countdown-editorial__ornament::before,
    .countdown-editorial__ornament::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 46%;
      height: 1px;
      background: currentColor;
      opacity: 0.65;
    }

    .countdown-editorial__ornament::before {
      left: 0;
    }

    .countdown-editorial__ornament::after {
      right: 0;
    }

    .countdown-editorial__ornament span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      border: 1px solid currentColor;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface-color);
    }

    .countdown-editorial__timer {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(0.75rem, 1.5vw, 1rem);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .countdown-editorial__unit {
      min-height: clamp(120px, 13vw, 160px);
      padding: clamp(1rem, 2vw, 1.4rem);
      box-sizing: border-box;
      display: grid;
      align-content: center;
      justify-items: center;
      border: 1px solid var(--surface-border-color);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5);
    }

    .countdown-editorial__number {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.6rem, 5vw, 4.6rem);
      font-weight: 400;
      line-height: 1;
      color: var(--primary-color);
    }

    .countdown-editorial__label {
      display: block;
      margin-top: 0.55rem;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(0.65rem, 1vw, 0.78rem);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent-color);
    }

    .countdown-editorial__date {
      display: block;
      margin-top: clamp(1.5rem, 3vw, 2.25rem);
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(0.8rem, 1.2vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--primary-color);
    }

    .countdown-editorial__motion {
      opacity: 0;
      transform: translateY(18px);
      animation: countdownEditorialReveal 0.5s ease-out forwards;
    }

    .countdown-editorial__intro {
      animation-delay: 0.04s;
    }

    .countdown-editorial__card {
      animation-delay: 0.12s;
    }

    .countdown-editorial__unit:nth-child(1) {
      animation-delay: 0.16s;
    }

    .countdown-editorial__unit:nth-child(2) {
      animation-delay: 0.2s;
    }

    .countdown-editorial__unit:nth-child(3) {
      animation-delay: 0.24s;
    }

    .countdown-editorial__unit:nth-child(4) {
      animation-delay: 0.28s;
    }

    @keyframes countdownEditorialReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 920px) {
      .countdown-editorial__inner {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .countdown-editorial__intro {
        max-width: 720px;
        margin: 0 auto;
      }

      .countdown-editorial__description {
        margin-left: auto;
        margin-right: auto;
      }

      .countdown-editorial__card {
        justify-self: center;
      }
    }

    @media (max-width: 620px) {
      .module-countdown-editorial-photo {
        min-height: 100svh;
      }

      .countdown-editorial__inner {
        min-height: 100svh;
        padding: 2rem 1.25rem;
      }

      .countdown-editorial__title {
        font-size: clamp(3.2rem, 16vw, 4.8rem);
      }

      .countdown-editorial__card {
        width: 100%;
        padding: 2.25rem 1.25rem;
      }

      .countdown-editorial__timer {
        grid-template-columns: repeat(2, 1fr);
      }

      .countdown-editorial__unit {
        min-height: 112px;
      }

      .countdown-editorial__date {
        letter-spacing: 0.16em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .countdown-editorial__motion {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>

  <div class="countdown-editorial__inner">
    <header
      class="countdown-editorial__intro countdown-editorial__motion"
      memory_type="text"
      memory_usage="custom"
      memory_key="countdown-editorial-intro"
    >
      <p class="countdown-editorial__eyebrow">
        Until We Say I Do
      </p>

      <h2 id="countdown-editorial-title" class="countdown-editorial__title">
        The wait is almost over.
      </h2>

      <p class="countdown-editorial__description">
        Every second brings us closer to the moment we gather with the people we
        love most.
      </p>
    </header>

    <article class="countdown-editorial__card countdown-editorial__motion">
      <header
        class="countdown-editorial__card-header"
        memory_type="text"
        memory_usage="custom"
        memory_key="countdown-card-header"
      >
        <h3 class="countdown-editorial__small-title">
          Wedding Countdown
        </h3>

        <p class="countdown-editorial__subtitle">
          Counting the days to forever.
        </p>

        <div class="countdown-editorial__ornament" aria-hidden="true">
          <span></span>
        </div>
      </header>

      <ol
        class="countdown-editorial__timer"
        memory_type="text"
        memory_usage="custom"
        memory_key="countdown-values"
        data-countdown-target="2027-10-18T16:30:00"
      >
        <li class="countdown-editorial__unit countdown-editorial__motion">
          <span class="countdown-editorial__number" data-countdown-unit="days">
            000
          </span>
          <span class="countdown-editorial__label">
            Days
          </span>
        </li>

        <li class="countdown-editorial__unit countdown-editorial__motion">
          <span class="countdown-editorial__number" data-countdown-unit="hours">
            00
          </span>
          <span class="countdown-editorial__label">
            Hours
          </span>
        </li>

        <li class="countdown-editorial__unit countdown-editorial__motion">
          <span class="countdown-editorial__number" data-countdown-unit="minutes">
            00
          </span>
          <span class="countdown-editorial__label">
            Minutes
          </span>
        </li>

        <li class="countdown-editorial__unit countdown-editorial__motion">
          <span class="countdown-editorial__number" data-countdown-unit="seconds">
            00
          </span>
          <span class="countdown-editorial__label">
            Seconds
          </span>
        </li>
      </ol>

      <time
        class="countdown-editorial__date"
        datetime="2027-10-18T16:30:00"
        memory_type="text"
        memory_usage="custom"
        memory_key="countdown-event-date"
      >
        October 18, 2027 · 4:30 PM
      </time>
    </article>
  </div>

  <script>
    const moduleMetadata = {
      tags: [
        "countdown",
        "contador",
        "cuenta regresiva",
        "boda",
        "foto de fondo",
        "overlay oscuro",
        "moderno",
        "editorial",
        "tarjeta blanca",
        "timer",
        "responsive"
      ],
      descripcion:
        "Wireframe de cuenta regresiva editorial con fondo fotográfico, overlay oscuro, encabezado lateral, tarjeta blanca y contador dinámico."
    };

    (function () {
      const module = document.querySelector('[data-gemini-id="countdown-target"]');

      if (!module) return;

      const timer = module.querySelector("[data-countdown-target]");
      const card = module.querySelector(".countdown-editorial__card");

      if (timer) {
        const targetDate = new Date(timer.getAttribute("data-countdown-target"));

        const units = {
          days: timer.querySelector('[data-countdown-unit="days"]'),
          hours: timer.querySelector('[data-countdown-unit="hours"]'),
          minutes: timer.querySelector('[data-countdown-unit="minutes"]'),
          seconds: timer.querySelector('[data-countdown-unit="seconds"]')
        };

        function pad(value, length) {
          return String(value).padStart(length, "0");
        }

        function updateCountdown() {
          const now = new Date();
          const distance = Math.max(targetDate.getTime() - now.getTime(), 0);

          const days = Math.floor(distance / (1000 * 60 * 60 * 24));
          const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
          const minutes = Math.floor((distance / (1000 * 60)) % 60);
          const seconds = Math.floor((distance / 1000) % 60);

          if (units.days) units.days.textContent = pad(days, 3);
          if (units.hours) units.hours.textContent = pad(hours, 2);
          if (units.minutes) units.minutes.textContent = pad(minutes, 2);
          if (units.seconds) units.seconds.textContent = pad(seconds, 2);
        }

        updateCountdown();
        window.setInterval(updateCountdown, 1000);
      }

      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      ).matches;

      if (prefersReducedMotion) return;

      module.addEventListener("pointermove", function (event) {
        const rect = module.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width - 0.5;
        const y = (event.clientY - rect.top) / rect.height - 0.5;

        if (card) {
          card.style.transform =
            "translate(" + x * 6 + "px, " + y * 5 + "px)";
        }
      });

      module.addEventListener("pointerleave", function () {
        if (card) {
          card.style.transform = "translate(0, 0)";
        }
      });
    })();
  </script>
</section>
